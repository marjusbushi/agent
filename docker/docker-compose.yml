services:
  openclaw:
    image: openclaw-local:latest
    container_name: openclaw-agent
    restart: always
    env_file:
      - /home/openclaw/.openclaw/.env
    environment:
      - HOME=/home/openclaw
      - NODE_ENV=production
      - TZ=Europe/Tirane
    volumes:
      - /home/openclaw/.openclaw:/home/openclaw/.openclaw
      - /home/openclaw/logs:/home/openclaw/logs
    networks:
      - openclaw-isolated
      - openclaw-external
    ports:
      - "127.0.0.1:18789:18789"
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M

  kommo-webhook:
    image: node:22-slim
    container_name: kommo-webhook
    restart: always
    user: "1000:1000"
    working_dir: /home/openclaw/.openclaw/integrations/kommo
    env_file:
      - /home/openclaw/.openclaw/.env
    environment:
      - HOME=/home/openclaw
      - NODE_ENV=production
      - TZ=Europe/Tirane
    volumes:
      - /home/openclaw/.openclaw:/home/openclaw/.openclaw
    networks:
      - openclaw-external
    ports:
      - "127.0.0.1:18790:18790"
    command: >
      sh -c "
        cd /home/openclaw/.openclaw/integrations/kommo &&
        npm install --production 2>/dev/null &&
        node webhook-handler.js
      "
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18790/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

networks:
  openclaw-isolated:
    external: true
  openclaw-external:
    external: true
